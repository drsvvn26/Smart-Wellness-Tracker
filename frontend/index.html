<!DOCTYPE html>
<html ng-app="wellnessApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Wellness Tracker</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/themes.css">
</head>
<body ng-controller="MainController">
    <!-- Top Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#!/">
                <i class="bi bi-heart-pulse"></i> Smart Wellness Tracker
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <button class="btn btn-sm btn-outline-light ms-2" ng-click="toggleTheme()">
                            <i class="bi" ng-class="currentTheme === 'light' ? 'bi-moon-stars' : 'bi-sun'"></i>
                            {{currentTheme === 'light' ? 'Dark' : 'Light'}} Mode
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="#!/">
                                <i class="bi bi-speedometer2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#!/habits">
                                <i class="bi bi-check2-square"></i> Habit Tracker
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#!/health">
                                <i class="bi bi-heart-pulse-fill"></i> Health Checker
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#!/analytics">
                                <i class="bi bi-graph-up"></i> Analytics
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#!/calendar">
                                <i class="bi bi-calendar-event"></i> Calendar
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#!/profile">
                                <i class="bi bi-person-circle"></i> Profile
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#!/about">
                                <i class="bi bi-info-circle"></i> About
                            </a>
                        </li>
                    </ul>
                    
                    <hr>
                    
                    <!-- JS Features Section -->
                    <div class="mt-3 px-3">
                        <h6 class="sidebar-heading">JS Features</h6>
                        <ul class="nav flex-column">
                            <li class="nav-item">
                                <a class="nav-link small" href="#!/js-features">
                                    <i class="bi bi-code-square"></i> Interactive JS
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div ng-view></div>
            </main>
        </div>
    </div>

    <!-- Reminder Modal -->
    <div class="modal fade" id="reminderModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title"><i class="bi bi-bell"></i> Reminder</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>{{reminderMessage}}</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Got it!</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Streak Broken Alert Modal -->
    <div class="modal fade" id="streakAlertModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-exclamation-triangle"></i> Streak Broken!</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>{{streakMessage}}</p>
                    <p class="text-muted">Don't give up! Start fresh today and build a stronger streak!</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal">I'll do better</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div ng-show="loading" class="loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- jQuery (for Bootstrap) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- App JS Files -->
    <script src="js/app.js"></script>
    <script src="js/config.js"></script>
    <script src="js/services/apiService.js"></script>
    <script src="js/services/mathService.js"></script>
    <script src="js/services/reminderService.js"></script>
    <script src="js/filters/primeFilter.js"></script>
    <script src="js/directives/calculator.js"></script>
    <script src="js/controllers/MainController.js"></script>
    <script src="js/controllers/DashboardController.js"></script>
    <script src="js/controllers/HabitsController.js"></script>
    <script src="js/controllers/HealthController.js"></script>
    <script src="js/controllers/AnalyticsController.js"></script>
    <script src="js/controllers/CalendarController.js"></script>
    <script src="js/controllers/ProfileController.js"></script>
    <script src="js/controllers/AboutController.js"></script>
    <script src="js/controllers/JSFeaturesController.js"></script>
</body>
</html>
