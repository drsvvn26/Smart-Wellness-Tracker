<!-- Habits View -->
<div class="py-4 fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-gradient"><i class="bi bi-check2-square"></i> Habit Tracker</h2>
        <button class="btn btn-primary" ng-click="showAddForm()" ng-hide="showForm">
            <i class="bi bi-plus-circle"></i> Add Habit
        </button>
    </div>

    <!-- Add/Edit Habit Form -->
    <div ng-show="showForm" class="card mb-4">
        <div class="card-header">
            <i class="bi bi-{{editMode ? 'pencil' : 'plus'}}-square"></i> {{editMode ? 'Edit' : 'Add New'}} Habit
        </div>
        <div class="card-body">
            <form name="habitFormData" ng-submit="saveHabit()">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Habit Name *</label>
                        <input type="text" class="form-control" ng-model="habitForm.habitName" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Frequency</label>
                        <select class="form-select" ng-model="habitForm.frequency">
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" ng-model="habitForm.description" rows="3"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle"></i> Save Habit
                    </button>
                    <button type="button" class="btn btn-secondary" ng-click="cancelForm()">
                        <i class="bi bi-x-circle"></i> Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Habits List -->
    <div class="row">
        <div class="col-12" ng-show="loading">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>

        <div class="col-12" ng-show="!loading && habits.length === 0">
            <div class="alert alert-info">
                <i class="bi bi-info-circle"></i> No habits found. Start by adding your first habit!
            </div>
        </div>

        <div class="col-md-6" ng-repeat="habit in habits">
            <div class="habit-item" ng-class="{'completed': isCompletedToday(habit), 'missed': !isCompletedToday(habit) && habit.streak === 0}">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <h5 class="mb-1">
                            <i class="bi bi-{{isCompletedToday(habit) ? 'check-circle-fill text-success' : 'circle'}}"></i>
                            {{habit.habitName}}
                        </h5>
                        <p class="text-muted small mb-0">{{habit.description}}</p>
                    </div>
                    <span class="streak-badge">
                        <i class="bi bi-fire"></i> {{habit.streak}}
                    </span>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <div class="small text-muted">
                        <i class="bi bi-trophy"></i> Best: {{habit.longestStreak}} days
                    </div>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-success" ng-click="completeHabit(habit)" ng-disabled="isCompletedToday(habit)">
                            <i class="bi bi-check"></i> {{isCompletedToday(habit) ? 'Done' : 'Complete'}}
                        </button>
                        <button class="btn btn-outline-primary" ng-click="editHabit(habit)">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-outline-danger" ng-click="deleteHabit(habit)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
